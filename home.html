<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HOME_PAGE</title>
    <link rel="stylesheet" href="./styles/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-[#F8FAFC]">
    <!-- header -->
    <header class="navbar bg-base-100 shadow-sm flex justify-between px-6 py-4">
      <div class="flex">
        <img
          src="./assets/github-logo.png"
          alt="GitHub Logo"
          class="w-8 md:w-8"
        />
        <h2 class="text-xl font-bold ml-2">GitHub Issues Tracker</h2>
      </div>
      <div class="flex gap-4">
        <input
          id="searchInput"
          type="search"
          placeholder="Search issues..."
          class="input"
        />
        <button id="searchBtn" class="btn btn-primary">New Issue</button>
      </div>
    </header>

    <!-- tab section -->
    <div
      class="flex gap-4 px-6 py-4 bg-white shadow-sm min-w-80 max-w-260 mx-auto mt-6 rounded-lg"
    >
      <a
        id="tab-all"
        onclick="tabSwitch('all')"
        class="btn bg-blue-500 text-white border w-20 md:w-30"
        >ALL</a
      >
      <a
        id="tab-open"
        onclick="tabSwitch('open')"
        class="btn bg-white borderw-20 w-20 md:w-30"
        >OPEN</a
      >
      <a
        id="tab-closed"
        onclick="tabSwitch('closed')"
        class="btn bg-white border w-20 md:w-30"
        >CLOSED</a
      >
    </div>

    <!-- issue count -->
    <section>
      <div
        class="flex justify-between items-center gap-4 px-6 py-4 bg-white shadow-sm min-w-80 max-w-260 mx-auto mt-6 rounded-lg"
      >
        <div class="flex gap-4">
          <img
            src="./assets/Aperture.png"
            alt=""
            class="w-14 h-14 p-1 bg-blue-200 rounded-full"
          />
          <div class="flex flex-col gap-1">
            <h2 class="text-xl font-semibold">
              <span id="issueCount">0</span> Issues
            </h2>
            <p class="text-gray-500">Track and manage your project issues</p>
          </div>
        </div>
        <div class="flex gap-5 items-center">
          <div class="flex gap-2 items-center">
            <div class="bg-green-500 w-3 h-3 rounded-full inline-block"></div>
            <h3>OPEN</h3>
          </div>
          <div class="flex gap-2 items-center">
            <div class="bg-purple-500 w-3 h-3 rounded-full inline-block"></div>
            <h3>CLOSED</h3>
          </div>
        </div>
      </div>

      <!-- loading -->
      <span
        id="spinner"
        class="loading loading-spinner text-info w-20 block mx-auto mt-10 hidden"
      ></span>
      <!--all cards -->
      <div
        id="cardContainer"
        class="p-4 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4 mt-6 min-w-80 max-w-260 mx-auto"
      ></div>
      <!-- open issues -->
      <div
        id="openIssues"
        class="p-4 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4 mt-6 min-w-80 max-w-260 mx-auto"
      ></div>
      <!-- closed issues -->
      <div
        id="closedIssues"
        class="p-4 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4 mt-6 min-w-80 max-w-260 mx-auto"
      ></div>
    </section>

    <!-- modal -->
    <dialog onclick="my_modal_1.showModal()" id="my_modal_1" class="modal">
      <div class="modal-box space-y-4">
        <div class="bg-white rounded-2xl space-y-4">
          <h1 id="modalTitle" class="text-xl font-bold"></h1>

          <div class="flex items-center gap-3 text-sm text-gray-500 mb-6">
            <span
              class="bg-green-500 text-white px-3 py-1 rounded-full font-medium"
            >
              Opened
            </span>
            <span
              >Opened by
              <span class="font-semibold text-gray-700">Fahim Ahmed</span></span
            >
            <span>22/02/2026</span>
          </div>

          <div class="flex gap-2 mb-8">
            <span
              class="flex items-center gap-1 bg-red-50 text-red-500 border border-red-100 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider"
            >
              BUG
            </span>
            <span
              class="flex items-center gap-1 bg-orange-50 text-red-500 border border-orange-100 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider"
            >
              HELP WANTED
            </span>
          </div>

          <p id="modalDescription" class="">
          </p>

          <div
            class="bg-slate-50 rounded-xl p-6 flex justify-between items-start mb-8"
          >
            <div>
              <p class="text-slate-400 text-sm mb-2">Assignee:</p>
              <p id="modalAssignee" class="font-bold text-slate-800 text-lg"></p>
            </div>

            <div class="text-right">
              <p class="text-slate-400 text-sm mb-2">Priority:</p>
              <span id="modalPriority"
                class="bg-red-500 text-white px-4 py-1 rounded-full text-xs font-bold shadow-sm"
              >
                HIGH
              </span>
            </div>
          </div>
        </div>
        <div class="modal-action">
          <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
            <button class="btn btn-primary">Close</button>
          </form>
        </div>
      </div>
    </dialog>

    <script src="./src/home.js"></script>
  </body>
</html>
