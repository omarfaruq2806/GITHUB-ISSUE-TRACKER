<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HOME_PAGE</title>
    <link rel="stylesheet" href="./styles/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-[#F8FAFC]">
    <header class="navbar bg-base-100 shadow-sm flex justify-between px-6 py-4">
      <div class="flex">
        <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-8" />
        <h2 class="text-xl font-bold ml-2">GitHub Issues Tracker</h2>
      </div>
      <div class="flex gap-4">
        <input type="search" placeholder="Search issues..." class="input" />
        <button class="btn btn-primary">Primary</button>
      </div>
    </header>

    <!-- tab section -->
    <div
      class="flex gap-4 px-6 py-4 bg-white shadow-sm w-250 mx-auto mt-6 rounded-lg"
    >
      <a href="" class="btn bg-white border w-30">ALL</a>
      <a href="" class="btn bg-white border w-30">OPEN</a>
      <a href="" class="btn bg-white border w-30">CLOSED</a>
    </div>

    <!-- issue count -->
    <section>
      <div
        class="flex justify-between items-center gap-4 px-6 py-4 bg-white shadow-sm w-250 mx-auto mt-6 rounded-lg"
      >
        <div class="flex gap-4">
          <img
            src="./assets/Aperture.png"
            alt=""
            class="w-14 h-14 p-1 bg-blue-200 rounded-full"
          />
          <div class="flex flex-col gap-1">
            <h2 class="text-xl font-semibold">
              <span id="issueCount">0</span> Issues
            </h2>
            <p class="text-gray-500">Track and manage your project issues</p>
          </div>
        </div>
        <div class="flex gap-5 items-center">
          <div class="flex gap-2 items-center">
            <div class="bg-green-500 w-3 h-3 rounded-full inline-block"></div>
            <h3>OPEN</h3>
          </div>
          <div class="flex gap-2 items-center">
            <div class="bg-purple-500 w-3 h-3 rounded-full inline-block"></div>
            <h3>CLOSED</h3>
          </div>
        </div>
      </div>
      <!-- cards -->
      <div
        class="p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-6 w-250 mx-auto"
      >
        <!-- card-1 -->
        <div class="p-4 space-y-4 border-t-4 rounded-xl border-green-500 bg-white shadow-sm">
          <div class="flex justify-between items-center">
            <img src="./assets/Open-Status.png" alt="" class="w-7 h-7" />
            <h2 class="btn btn-soft btn-error rounded-3xl btn-outline">HIGH</h2>
          </div>
          <div class="space-y-1">
            <h1 class="font-bold text-xl">Fix navigation menu on mobile devices</h1>
            <p class="text-gray-500">
              The navigation menu doesn't collapse properly on mobile devices...
            </p>
          </div>
          <div class="pb-4 border-b border-gray-300"> <!--  -->
            <p class="btn btn-soft btn-error rounded-3xl btn-outline">BUG</p>
            <p class="btn btn-soft btn-warning rounded-3xl btn-outline">
              HELP WANTED
            </p>
          </div><hr>
          <div class="px-4 grid gap-1">
            <p class="text-gray-500">#1 by john_doe</p>
            <p class="text-gray-500">1/15/2024</p>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
